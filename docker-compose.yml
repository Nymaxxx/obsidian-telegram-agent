services:
  takopi:
    build: .
    restart: unless-stopped
    stop_grace_period: 15s

    environment:
      # Anthropic API key (used by Claude Code via Takopi)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?}

      # Telegram transport (required)
      - TAKOPI_TELEGRAM_BOT_TOKEN=${TAKOPI_TELEGRAM_BOT_TOKEN:?}
      - TAKOPI_TELEGRAM_CHAT_ID=${TAKOPI_TELEGRAM_CHAT_ID:?}
      - TAKOPI_ALLOWED_USER_IDS=${TAKOPI_ALLOWED_USER_IDS:-}

      # Claude Code model + safety
      - TAKOPI_CLAUDE_MODEL=${TAKOPI_CLAUDE_MODEL:-claude-opus-4-6}
      - TAKOPI_CLAUDE_ALLOWED_TOOLS=${TAKOPI_CLAUDE_ALLOWED_TOOLS:-Bash,Read,Edit,Write}
      - TAKOPI_CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS=${TAKOPI_CLAUDE_DANGEROUSLY_SKIP_PERMISSIONS:-false}
      - TAKOPI_CLAUDE_USE_API_BILLING=${TAKOPI_CLAUDE_USE_API_BILLING:-true}

      # GitHub access (clone/push/PR)
      - GH_TOKEN=${GH_TOKEN:?}
      - GITHUB_REPOS=${GITHUB_REPOS:-}
      - AUTO_SETUP_REPOS=${AUTO_SETUP_REPOS:-true}

      # Voice transcription (send voice messages in Telegram)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - VOICE_TRANSCRIPTION=${VOICE_TRANSCRIPTION:-false}
      - VOICE_TRANSCRIPTION_MODEL=${VOICE_TRANSCRIPTION_MODEL:-gpt-4o-mini-transcribe}
      - VOICE_TRANSCRIPTION_BASE_URL=${VOICE_TRANSCRIPTION_BASE_URL:-}
      - VOICE_TRANSCRIPTION_API_KEY=${VOICE_TRANSCRIPTION_API_KEY:-}

      # Claude Code Tasks (persistent cross-session task tracking)
      - CLAUDE_CODE_TASK_LIST_ID=${CLAUDE_CODE_TASK_LIST_ID:-takopi-homelab}

      # Takopi UX
      - TAKOPI_SESSION_MODE=${TAKOPI_SESSION_MODE:-chat}
      - TAKOPI_SHOW_RESUME_LINE=${TAKOPI_SHOW_RESUME_LINE:-true}
      - TAKOPI_DEFAULT_ENGINE=${TAKOPI_DEFAULT_ENGINE:-claude}

    volumes:
      - takopi_state:/home/agent/.takopi
      - claude_state:/home/agent/.claude
      - repos:/work/repos

    working_dir: /work/repos

    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "1.0"

volumes:
  takopi_state:
  claude_state:
  repos:
