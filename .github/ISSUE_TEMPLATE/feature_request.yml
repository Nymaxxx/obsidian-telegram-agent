name: Feature request
description: Suggest a new feature or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's getting in the way?
      placeholder: I want to capture screenshots from my phone, but…
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Optional. Describe what you have in mind.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Other approaches you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues — anything that helps.
