name: Build Images

# Builds and pushes the takopi and obsidian-headless images to GHCR.
# Pre-built images let users `docker compose pull` instead of building locally,
# which avoids OOM on 1 GB VPS and cuts install time from ~5–10 min to ~30 sec.
#
# Tags pushed:
#   :latest      — only on push to main
#   :<short-sha> — every build
#   :v<X.Y.Z>    — when a GitHub Release is published with tag vX.Y.Z
#   :<X.Y>       — semver minor alias for releases
#
# After the first run, manually flip both packages to public visibility in
# GitHub UI (Settings → Packages → <package> → Change visibility) so anonymous
# `docker pull` works on the VPS without `docker login`.

on:
  push:
    branches: [main]
    paths:
      - 'takopi/**'
      - 'obsidian-headless/**'
      - '.github/workflows/build-images.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: takopi
            context: ./takopi
            image: ghcr.io/nymaxxx/obsidian-telegram-agent/takopi
          - service: obsidian-headless
            context: ./obsidian-headless
            image: ghcr.io/nymaxxx/obsidian-telegram-agent/obsidian-headless
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
