name: Inspect VPS

# Manual diagnostic workflow. SSHes to the VPS and prints a summary of:
#   - the deployed git commit
#   - relevant .env keys (API keys masked, CLAUDE_EXTRA_INSTRUCTIONS truncated)
#   - container status
#   - sizes of CLAUDE.{base,local,md} and the last 50 lines of the generated
#     CLAUDE.md the agent actually reads
#   - the takopi container's view of CLAUDE_EXTRA_INSTRUCTIONS (length + first
#     line) so you can confirm the var travelled all the way through
#   - recent entrypoint output ("Generated …", "Assembled …", chat_id binding)
#
# Trigger from the Actions tab → "Inspect VPS" → "Run workflow".
#
# Privacy note: this workflow prints output into the run log. CLAUDE_EXTRA_INSTRUCTIONS
# is shown truncated (length + first line); the assembled CLAUDE.md tail is printed
# in full. Don't put real secrets into either; they're meant for behavior rules.

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect VPS state
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -uo pipefail
            DEPLOY_DIR="$HOME/obsidian-telegram-agent"
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "FATAL: $DEPLOY_DIR does not exist on the VPS yet."
              exit 1
            fi
            cd "$DEPLOY_DIR"

            section() { printf '\n========== %s ==========\n' "$1"; }

            section "Repository"
            echo "Path: $(pwd)"
            git log -1 --format='Commit: %h%nSubject: %s%nAuthor:  %an%nDate:    %ai'
            DIRTY=$(git status --porcelain | wc -l)
            echo "Working-tree changes: $DIRTY file(s)"

            section ".env (sensitive values masked)"
            # Only iterate over lines that look like KEY=... — skips comments,
            # blank lines, and (importantly) the continuation lines of multi-line
            # quoted values like CLAUDE_EXTRA_INSTRUCTIONS. The container env
            # section below shows the resolved length and first line.
            if [ -f .env ]; then
              grep -E '^[A-Z_][A-Z0-9_]*=' .env | while IFS='=' read -r key val; do
                case "$key" in
                  TELEGRAM_BOT_TOKEN|ANTHROPIC_API_KEY|OPENAI_API_KEY|VOICE_TRANSCRIPTION_API_KEY)
                    echo "$key=***masked***"
                    ;;
                  CLAUDE_EXTRA_INSTRUCTIONS)
                    preview="${val#\"}"
                    preview=$(printf '%s' "$preview" | head -c 80)
                    echo "$key=<see takopi container env section below for resolved length>"
                    echo "  first 80 chars: $preview"
                    ;;
                  *)
                    echo "$key=$val"
                    ;;
                esac
              done
            else
              echo "(.env missing)"
            fi

            section "Docker containers"
            docker compose ps 2>&1 || true

            section "CLAUDE.md layers on host (vault/)"
            for f in CLAUDE.base.md CLAUDE.local.md CLAUDE.md; do
              p="vault/$f"
              if [ -f "$p" ]; then
                printf '%-22s %5s lines  %7s bytes\n' "$p" "$(wc -l < "$p")" "$(stat -c '%s' "$p")"
              else
                printf '%-22s ABSENT\n' "$p"
              fi
            done

            section "CLAUDE.md as seen inside takopi container"
            if docker compose exec -T takopi true 2>/dev/null; then
              docker compose exec -T takopi sh -c '
                set -u
                if [ ! -f /vault/CLAUDE.md ]; then
                  echo "(/vault/CLAUDE.md does not exist — assemble_claude_md may have skipped)"
                  exit 0
                fi
                echo "Section headers (## ...) in /vault/CLAUDE.md:"
                grep -nE "^## " /vault/CLAUDE.md || true
                echo ""
                echo "--- last 50 lines ---"
                tail -n 50 /vault/CLAUDE.md
              '
            else
              echo "(takopi container is not running — cannot exec)"
            fi

            section "takopi container env (CLAUDE-related)"
            # Buffer to a temp file so any ssh-action / drone-ssh banner output
            # (which sometimes interleaves with stdout from earlier exec calls)
            # cannot land inside this block.
            if docker compose exec -T takopi true >/dev/null 2>&1; then
              docker compose exec -T takopi sh -c '
                set -u
                for k in CLAUDE_MODEL CLAUDE_USE_API_BILLING CLAUDE_ALLOWED_TOOLS CLAUDE_DENIED_COMMANDS TAKOPI_SESSION_MODE TZ TELEGRAM_CHAT_ID; do
                  eval "v=\${$k:-}"
                  if [ -n "$v" ]; then
                    echo "$k=$v"
                  else
                    echo "$k=(unset)"
                  fi
                done
                if [ -n "${CLAUDE_EXTRA_INSTRUCTIONS:-}" ]; then
                  echo "CLAUDE_EXTRA_INSTRUCTIONS=<<${#CLAUDE_EXTRA_INSTRUCTIONS} chars>>"
                  echo "  first line: $(printf %s "$CLAUDE_EXTRA_INSTRUCTIONS" | head -n 1)"
                else
                  echo "CLAUDE_EXTRA_INSTRUCTIONS=(unset — env var did not reach the container)"
                fi
              ' 2>&1
            else
              echo "(takopi container is not running)"
            fi

            section "Recent takopi entrypoint output"
            docker compose logs takopi --tail 30 2>&1 \
              | grep -E "Generated|Assembled|chat_id|ERROR|Warning" \
              || echo "(no relevant lines in last 30 log entries)"

            section "Done"
